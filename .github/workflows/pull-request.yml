name: Pull Request

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: oven/bun:1
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/test
